<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Maricela Hernanadez- Michel Calderon">
  <title>Inventario</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

<header>

  <h1>Inventario de Productos</h1>

  <button id="btn-salir" class="btn-salir">
    Cerrar sesión
  </button>

</header>

<main>

<section>

  <fieldset id="formulario-producto">

    <legend>Agregar Producto</legend>

    <input type="hidden" id="producto-id">

    <label for="nombre">Nombre</label>
    <input type="text" id="nombre">

    <label for="descripcion">Descripción</label>
    <textarea id="descripcion"></textarea>

    <label for="precio">Precio</label>
    <input type="number" id="precio">

    <label for="cantidad">Cantidad</label>
    <input type="number" id="cantidad">

    <label for="imagen_url">URL Imagen</label>
    <input type="url" id="imagen_url">

    <button id="btn-guardar" class="btn-principal">
      Guardar producto
    </button>

    <button id="btn-cancelar" class="btn-cancelar">
      Cancelar
    </button>

  </fieldset>

</section>

<section>

  <h2>Productos</h2>

  <div id="lista-productos"></div>

</section>

</main>

<footer>
  <p>Inventario 2025</p>
</footer>

<!-- Librería Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS -->
<script src="./supabase.js"></script>
<script src="./auth.js"></script>
<script src="./crud.js"></script>
<script src="./app.js"></script>

</body>
</html>
