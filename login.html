<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

<header>
  <h1>Sistema Inventario</h1>
</header>

<main>

  <section class="login-caja">

    <h2>Iniciar sesión</h2>

    <p id="error-auth" class="mensaje-error"></p>

    <p id="exito-auth" class="mensaje-exito"></p>

    <label for="email">Correo</label>
    <input type="email" id="email">

    <label for="contrasena">Contraseña</label>
    <input type="password" id="contrasena">

    <button id="btn-login" class="btn-principal">
      Ingresar
    </button>

    <button id="btn-registro" class="btn-cancelar">
      Registrarse
    </button>

  </section>

</main>

<footer>
  <p>Inventario 2025</p>
</footer>

<!-- Librería Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Archivos JS -->
<script src="./supabase.js"></script>
<script src="./auth.js"></script>

</body>
</html>
